<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Drive MP4 Link Extractor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0e13;
      --panel: #121722;
      --text: #e8ecf3;
      --muted: #a3acba;
      --accent: #66b3ff;
      --accent-soft: #1e2f46;
      --danger: #ff7171;
      --ok: #80e0a7;
      --border: #2a3342;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #111827 0%, var(--bg) 50%);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      padding: 24px;
    }

    .app {
      width: min(820px, 100%);
      background: color-mix(in oklab, var(--panel) 92%, black);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 18px 40px rgb(0 0 0 / 35%);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 6px;
      font-size: 1.3rem;
    }

    .subtitle {
      margin-top: 0;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    textarea,
    .output {
      width: 100%;
      border: 1px solid var(--border);
      background: #0d121a;
      color: var(--text);
      border-radius: 10px;
      padding: 12px;
      font: inherit;
      line-height: 1.4;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    textarea:focus,
    button:focus-visible,
    .chip:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .chips {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--border);
      background: #0e141e;
      color: var(--text);
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
      padding: 8px 12px;
      transition: 120ms ease;
    }

    .chip.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #dcebff;
    }

    .result {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .output {
      min-height: 52px;
      word-break: break-all;
      display: flex;
      align-items: center;
    }

    .hint,
    .status {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--ok);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      border: 1px solid var(--border);
      background: #111928;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    button.primary {
      border-color: color-mix(in oklab, var(--accent) 55%, var(--border));
      background: color-mix(in oklab, var(--accent-soft) 70%, #0a0f18);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Google Drive MP4 Link Extractor</h1>
    <p class="subtitle">Paste any Google Drive share link (or raw file ID) to generate a hosted MP4 URL that works across players.</p>

    <label for="input">Google Drive URL or File ID</label>
    <textarea id="input" placeholder="https://drive.google.com/file/d/FILE_ID/view"></textarea>

    <div class="chips" role="tablist" aria-label="Output format">
      <button class="chip active" role="tab" aria-selected="true" data-format="vlcWeb">Vercel .mp4 URL</button>
      <button class="chip" role="tab" aria-selected="false" data-format="movWeb">Vercel .mov URL</button>
      <button class="chip" role="tab" aria-selected="false" data-format="vlcDeep">vlc:// deep link</button>
      <button class="chip" role="tab" aria-selected="false" data-format="infuse">Infuse deep link</button>
      <button class="chip" role="tab" aria-selected="false" data-format="nplayer">nPlayer deep link</button>
      <button class="chip" role="tab" aria-selected="false" data-format="download">Direct download URL</button>
    </div>

    <section class="result" aria-live="polite">
      <div id="output" class="output">Enter a link to generate output.</div>
      <p id="hint" class="hint">Choose a format above after entering a valid link.</p>
      <p id="status" class="status"></p>
      <div class="actions">
        <button id="copyBtn" class="primary" disabled>Copy URL</button>
        <button id="openBtn" disabled>Open / Launch</button>
        <button id="downloadBtn" disabled>Download video</button>
      </div>
    </section>
  </main>

  <script>
    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');
    const hintEl = document.getElementById('hint');
    const statusEl = document.getElementById('status');
    const copyBtn = document.getElementById('copyBtn');
    const openBtn = document.getElementById('openBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const chipEls = [...document.querySelectorAll('.chip')];

    const hintsByFormat = {
      vlcWeb: 'Hosted Vercel MP4 URL ending in .mp4.',
      movWeb: 'Hosted Vercel MOV URL ending in .mov.',
      vlcDeep: 'vlc:// deep link: launches VLC directly with the hosted MP4 URL where supported.',
      infuse: 'Infuse deep link: opens Infuse with the hosted MP4 URL from this app.',
      nplayer: 'nPlayer deep link: opens nPlayer with the hosted MP4 URL from this app.',
      download: 'Direct download URL: prompts your browser to save the video file through this app.'
    };

    let selectedFormat = 'vlcWeb';
    let currentOutput = '';
    let resolvedMp4Url = '';
    let resolvedDownloadUrl = '';
    let resolvedMovUrl = '';
    let resolveCounter = 0;


    function setStatus(message, type = '') {
      statusEl.textContent = message || '';
      statusEl.classList.remove('ok', 'error');
      if (type) statusEl.classList.add(type);
    }

    function getRawInput() {
      const value = inputEl.value.trim();
      if (!value) {
        return { error: 'Please paste a Google Drive URL or file ID.' };
      }

      return { input: value };
    }

    function buildLinks() {
      const hostedMp4 = resolvedMp4Url;
      const hostedMov = resolvedMovUrl || hostedMp4.replace(/\.mp4(\?|$)/i, '.mov$1');
      return {
        vlcWeb: hostedMp4,
        movWeb: hostedMov,
        vlcDeep: `vlc://${hostedMp4}`,
        infuse: `infuse://x-callback-url/play?url=${encodeURIComponent(hostedMp4)}`,
        nplayer: `nplayer-${hostedMp4}`,
        download: resolvedDownloadUrl || `${hostedMp4}${hostedMp4.includes('?') ? '&' : '?'}download=1`
      };
    }

    async function resolveMp4Url(rawInput) {
      const nextCounter = resolveCounter + 1;
      resolveCounter = nextCounter;
      setStatus('Checking Drive link and preparing MP4 URL...');

      const query = encodeURIComponent(rawInput);
      const response = await fetch(`/api/resolve?input=${query}`);
      const data = await response.json();

      if (resolveCounter !== nextCounter) return;

      if (!response.ok) {
        throw new Error(data.detail || data.error || 'Could not resolve this Drive URL.');
      }

      resolvedMp4Url = data.mp4Url || '';
      resolvedDownloadUrl = data.downloadUrl || '';
      resolvedMovUrl = data.movUrl || '';
    }


    function fallbackResolveLocally(rawInput) {
      const value = String(rawInput || '').trim();
      const idMatch = value.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]{10,})/i)
        || value.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]{10,})/i)
        || value.match(/[?&]id=([a-zA-Z0-9_-]{10,})/i)
        || value.match(/^([a-zA-Z0-9_-]{10,})$/i);
      if (!idMatch?.[1]) return '';

      const fileId = idMatch[1];
      const rkMatch = value.match(/[?&](?:resourcekey|rk)=([a-zA-Z0-9_-]+)/i);

      let url = `${window.location.origin}/mp4/${encodeURIComponent(fileId)}.mp4`;
      if (rkMatch?.[1]) {
        url += `?rk=${encodeURIComponent(rkMatch[1])}`;
      }
      return url;
    }

    function updateActiveChip(nextFormat) {
      selectedFormat = nextFormat;
      chipEls.forEach((chip) => {
        const active = chip.dataset.format === nextFormat;
        chip.classList.toggle('active', active);
        chip.setAttribute('aria-selected', String(active));
      });
    }

    async function render() {
      const { input, error } = getRawInput();

      hintEl.textContent = hintsByFormat[selectedFormat];

      if (error) {
        currentOutput = '';
        resolvedMp4Url = '';
        resolvedDownloadUrl = '';
        resolvedMovUrl = '';
        outputEl.textContent = 'No output yet.';
        setStatus(error, 'error');
        copyBtn.disabled = true;
        openBtn.disabled = true;
        downloadBtn.disabled = true;
        return;
      }

      try {
        await resolveMp4Url(input);
      } catch (err) {
        const fallbackUrl = fallbackResolveLocally(input);
        if (!fallbackUrl) {
          currentOutput = '';
          resolvedMp4Url = '';
          resolvedDownloadUrl = '';
          resolvedMovUrl = '';
          outputEl.textContent = 'No output yet.';
          setStatus(err.message, 'error');
          copyBtn.disabled = true;
          openBtn.disabled = true;
          downloadBtn.disabled = true;
          return;
        }

        resolvedMp4Url = fallbackUrl;
        resolvedDownloadUrl = `${fallbackUrl}${fallbackUrl.includes('?') ? '&' : '?'}download=1`;
        resolvedMovUrl = '';
        setStatus(`Using local fallback URL (resolver error: ${err.message})`, 'ok');
      }

      const links = buildLinks();
      currentOutput = links[selectedFormat] || '';

      outputEl.textContent = currentOutput;
      setStatus('✓ MP4 URL is ready.', 'ok');
      copyBtn.disabled = false;
      openBtn.disabled = false;
      downloadBtn.disabled = false;
    }

    async function copyCurrentUrl() {
      if (!currentOutput) return;
      try {
        await navigator.clipboard.writeText(currentOutput);
        setStatus('✓ copied', 'ok');
        setTimeout(() => {
          if (statusEl.textContent === '✓ copied') {
            setStatus('');
          }
        }, 1200);
      } catch {
        setStatus('Clipboard access failed. Copy manually from the output box.', 'error');
      }
    }

    function openCurrentUrl() {
      if (!currentOutput) return;
      window.open(currentOutput, '_blank', 'noopener,noreferrer');
    }

    function downloadVideo() {
      const url = resolvedDownloadUrl || (resolvedMp4Url ? `${resolvedMp4Url}${resolvedMp4Url.includes('?') ? '&' : '?'}download=1` : '');
      if (!url) return;
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    inputEl.addEventListener('input', render);
    chipEls.forEach((chip) => {
      chip.addEventListener('click', () => {
        updateActiveChip(chip.dataset.format);
        render();
      });
    });

    copyBtn.addEventListener('click', copyCurrentUrl);
    openBtn.addEventListener('click', openCurrentUrl);
    downloadBtn.addEventListener('click', downloadVideo);

    render();
  </script>
</body>
</html>
